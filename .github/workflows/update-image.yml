name: Update Cutia Image

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if no new version"
        required: false
        default: false
        type: boolean
      target_version:
        description: "Target version to build (e.g., 0.1.0). Leave empty for latest."
        required: false
        default: ""
        type: string
      publish_to_store:
        description: "Publish to LazyCat App Store"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */6 * * *"

env:
  UPSTREAM_REPO: msgbyte/cutia
  PROJECT_NAME: Cutia
  PROJECT_NAME_LOWER: cutia
  OFFICIAL_IMAGE_REGISTRY: ""
  PRECOMPILED_BINARY_URL: ""
  DOCKERFILE_TYPE: custom
  SERVICE_PORT: 3000
  SERVICE_CMD: "bun run start"

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest commit info
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_VERSION="${{ inputs.target_version }}"

          if [ -n "$TARGET_VERSION" ]; then
            LATEST_VERSION="$TARGET_VERSION"
            echo "Using specified version: $LATEST_VERSION"
          else
            # 获取最新 commit SHA 作为版本
            LATEST_VERSION=$(gh api "repos/${{ env.UPSTREAM_REPO }}/commits/main" --jq '.sha[0:7]' 2>/dev/null || echo "latest")
            echo "Using commit: $LATEST_VERSION"
          fi

          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT

      - name: Check if update needed
        id: check-update
        run: |
          CURRENT_IMAGE=$(grep 'image:' lzc-manifest.yml | head -1 | awk '{print $2}')
          echo "Current image: $CURRENT_IMAGE"

          LATEST_VERSION="${{ steps.get-version.outputs.latest_version }}"
          FORCE_BUILD="${{ inputs.force_build }}"
          TARGET_VERSION="${{ inputs.target_version }}"

          if [ -n "$TARGET_VERSION" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "Target version specified: $TARGET_VERSION"
          elif [ "$FORCE_BUILD" = "true" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "Force build requested"
          elif [ -n "$LATEST_VERSION" ] && [[ "$CURRENT_IMAGE" != *"$LATEST_VERSION"* ]]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
            echo "New version available: $LATEST_VERSION"
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "Already on latest version"
          fi

      - name: Setup Node.js
        if: steps.check-update.outputs.update_needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install lzc-cli
        if: steps.check-update.outputs.update_needed == 'true'
        run: npm install -g @lazycatcloud/lzc-cli

      - name: Copy dependency images
        if: steps.check-update.outputs.update_needed == 'true'
        id: deps-images
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
        run: |
          echo "Processing dependency images..."
          
          # 处理 PostgreSQL
          echo "Checking postgres:16-alpine..."
          POSTGRES_EXISTING=$(lzc-cli appstore my-images 2>&1 | grep "postgres:16-alpine" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+postgres[a-zA-Z0-9_/.:-]+' | head -1 || echo "")
          if [ -n "$POSTGRES_EXISTING" ]; then
            echo "PostgreSQL already exists: $POSTGRES_EXISTING"
            POSTGRES_URL="$POSTGRES_EXISTING"
          else
            echo "Copying postgres:16-alpine..."
            COPY_OUTPUT=$(lzc-cli appstore copy-image postgres:16-alpine 2>&1)
            echo "$COPY_OUTPUT"
            POSTGRES_URL=$(echo "$COPY_OUTPUT" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+' | head -1 || echo "")
          fi
          echo "postgres_url=$POSTGRES_URL" >> $GITHUB_OUTPUT
          
          # 处理 Redis
          echo "Checking redis:7-alpine..."
          REDIS_EXISTING=$(lzc-cli appstore my-images 2>&1 | grep "redis:7-alpine" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+redis[a-zA-Z0-9_/.:-]+' | head -1 || echo "")
          if [ -n "$REDIS_EXISTING" ]; then
            echo "Redis already exists: $REDIS_EXISTING"
            REDIS_URL="$REDIS_EXISTING"
          else
            echo "Copying redis:7-alpine..."
            COPY_OUTPUT=$(lzc-cli appstore copy-image redis:7-alpine 2>&1)
            echo "$COPY_OUTPUT"
            REDIS_URL=$(echo "$COPY_OUTPUT" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+' | head -1 || echo "")
          fi
          echo "redis_url=$REDIS_URL" >> $GITHUB_OUTPUT
          
          echo "Dependency images ready"

      - name: Clone upstream source code
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          LATEST_VERSION="${{ steps.get-version.outputs.latest_version }}"
          echo "Cloning upstream repository: ${{ env.UPSTREAM_REPO }}"
          
          # 克隆上游仓库
          git clone --depth 1 https://github.com/${{ env.UPSTREAM_REPO }}.git /tmp/cutia-source
          
          # 如果指定了版本，切换到对应 commit
          if [ -n "$LATEST_VERSION" ] && [ "$LATEST_VERSION" != "latest" ]; then
            cd /tmp/cutia-source
            git fetch --depth 1 origin $LATEST_VERSION || true
            git checkout $LATEST_VERSION 2>/dev/null || echo "Using default branch"
          fi
          
          echo "Source code cloned to /tmp/cutia-source"

      - name: Build and push image
        if: steps.check-update.outputs.update_needed == 'true'
        id: build-image
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_VERSION="${{ steps.get-version.outputs.latest_version }}"

          echo "Building Cutia from source code..."

          # 检查是否已有构建好的镜像
          if [ "${{ inputs.force_build }}" != "true" ]; then
            EXISTING_IMAGE=$(lzc-cli appstore my-images 2>&1 | grep "$LATEST_VERSION" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+' | head -1 || echo "")
            if [ -n "$EXISTING_IMAGE" ]; then
              echo "Found existing image: $EXISTING_IMAGE"
              echo "accelerated_url=$EXISTING_IMAGE" >> $GITHUB_OUTPUT
              echo "build_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
              echo "Existing image found, skipping build"
              exit 0
            fi
          else
            echo "Force build enabled, skipping existing image check"
          fi

          # 使用克隆的上游源码构建
          cd /tmp/cutia-source
          
          # 获取上游版本
          UPSTREAM_COMMIT=$(git rev-parse HEAD)
          VERSION_TAG="${UPSTREAM_COMMIT:0:7}"
          echo "Building version: $VERSION_TAG"
          
          # 复制 Dockerfile.template 到源码目录
          cp ${{ github.workspace }}/Dockerfile.template ./Dockerfile

          # 构建镜像
          LOCAL_IMAGE="ghcr.io/${{ github.repository_owner }}/cutia:$VERSION_TAG"
          LOCAL_IMAGE=$(echo "$LOCAL_IMAGE" | tr '[:upper:]' '[:lower:]')
          docker build -t "$LOCAL_IMAGE" .

          echo "$GITHUB_TOKEN" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
          docker push "$LOCAL_IMAGE"

          # 复制到懒猫镜像源
          COPY_OUTPUT=$(lzc-cli appstore copy-image "$LOCAL_IMAGE" 2>&1)
          echo "$COPY_OUTPUT"
          ACCELERATED_URL=$(echo "$COPY_OUTPUT" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+' | head -1 || echo "")

          if [ -z "$ACCELERATED_URL" ]; then
            echo "Failed to get accelerated URL"
            exit 1
          fi

          echo "accelerated_url=$ACCELERATED_URL" >> $GITHUB_OUTPUT
          echo "build_version=$VERSION_TAG" >> $GITHUB_OUTPUT

      - name: Update manifest
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          ACCELERATED_URL="${{ steps.build-image.outputs.accelerated_url }}"
          BUILD_VERSION="${{ steps.build-image.outputs.build_version }}"
          POSTGRES_URL="${{ steps.deps-images.outputs.postgres_url }}"
          REDIS_URL="${{ steps.deps-images.outputs.redis_url }}"
          
          # 更新主镜像和版本
          sed -i "s|image: .*|image: $ACCELERATED_URL|g" lzc-manifest.yml
          sed -i "s|^version:.*|version: $BUILD_VERSION|g" lzc-manifest.yml
          
          # 更新 PostgreSQL 镜像地址
          if [ -n "$POSTGRES_URL" ]; then
            # 提取 postgres 镜像名 (去掉 tag)
            POSTGRES_IMAGE=$(echo "$POSTGRES_URL" | sed 's/:.*$//')
            sed -i "s|image: registry.lazycat.cloud/library/postgres:16-alpine|image: $POSTGRES_URL|g" lzc-manifest.yml
            echo "Updated PostgreSQL to: $POSTGRES_URL"
          fi
          
          # 更新 Redis 镜像地址
          if [ -n "$REDIS_URL" ]; then
            sed -i "s|image: registry.lazycat.cloud/library/redis:7-alpine|image: $REDIS_URL|g" lzc-manifest.yml
            echo "Updated Redis to: $REDIS_URL"
          fi
          
          echo "Updated to version: $BUILD_VERSION"
          echo "Updated image: $ACCELERATED_URL"

      - name: Build package
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
        run: |
          lzc-cli project build -o ${{ env.PROJECT_NAME_LOWER }}.lpk

      - name: Publish to LazyCat App Store
        if: steps.check-update.outputs.update_needed == 'true' && inputs.publish_to_store == true
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
        run: |
          BUILD_VERSION="${{ steps.build-image.outputs.build_version }}"
          RELEASE_NOTES="Auto-built from upstream commit $BUILD_VERSION"
          lzc-cli appstore publish ${{ env.PROJECT_NAME_LOWER }}.lpk --clang en -c "$RELEASE_NOTES"

      - name: Create GitHub Release
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_VERSION="${{ steps.build-image.outputs.build_version }}"
          gh release delete "v$BUILD_VERSION" --yes 2>/dev/null || true
          gh release create "v$BUILD_VERSION" \
            --title "v$BUILD_VERSION" \
            --notes "Auto-built from upstream commit $BUILD_VERSION" \
            ${{ env.PROJECT_NAME_LOWER }}.lpk

      - name: Commit and push changes
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          BUILD_VERSION="${{ steps.build-image.outputs.build_version }}"
          FILE_SHA=$(gh api repos/${{ github.repository }}/contents/lzc-manifest.yml --jq '.sha' 2>/dev/null || echo "")
          if [ -z "$FILE_SHA" ]; then
            echo "Failed to get file SHA"
            exit 1
          fi
          gh api -X PUT repos/${{ github.repository }}/contents/lzc-manifest.yml \
            -f message="Update ${{ env.PROJECT_NAME }} to version $BUILD_VERSION" \
            -f content="$(base64 -w 0 lzc-manifest.yml)" \
            -f sha="$FILE_SHA" \
            -f branch="${{ github.ref_name }}"
