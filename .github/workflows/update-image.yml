name: Update Cutia Image

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if no new version"
        required: false
        default: false
        type: boolean
      target_version:
        description: "Target version to build (commit SHA prefix). Leave empty for latest."
        required: false
        default: ""
        type: string
      publish_to_store:
        description: "Publish to LazyCat App Store"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */6 * * *"

env:
  UPSTREAM_REPO: msgbyte/cutia
  PROJECT_NAME: Cutia
  PROJECT_NAME_LOWER: cutia

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get target version
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_VERSION="${{ inputs.target_version }}"

          if [ -n "$TARGET_VERSION" ]; then
            LATEST_VERSION="$TARGET_VERSION"
            RELEASE_NOTES="Manual build for commit $TARGET_VERSION"
          else
            LATEST_VERSION=$(gh api "repos/${{ env.UPSTREAM_REPO }}/commits/main" --jq '.sha[0:7]' 2>/dev/null || echo "latest")
            RELEASE_NOTES="Auto build from ${{ env.UPSTREAM_REPO }} commit $LATEST_VERSION"
          fi

          echo "latest_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
          echo "$RELEASE_NOTES" > /tmp/release_notes.txt

      - name: Check if update needed
        id: check-update
        run: |
          CURRENT_VERSION=$(grep '^version:' lzc-manifest.yml | head -1 | awk '{print $2}')
          LATEST_VERSION="${{ steps.get-version.outputs.latest_version }}"
          FORCE_BUILD="${{ inputs.force_build }}"
          TARGET_VERSION="${{ inputs.target_version }}"

          echo "Current version: $CURRENT_VERSION"
          echo "Latest version: $LATEST_VERSION"

          if [ -n "$TARGET_VERSION" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          elif [ "$FORCE_BUILD" = "true" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$LATEST_VERSION" ] && [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone upstream source code
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          LATEST_VERSION="${{ steps.get-version.outputs.latest_version }}"
          git clone --depth 1 https://github.com/${{ env.UPSTREAM_REPO }}.git /tmp/cutia-source

          if [ -n "$LATEST_VERSION" ] && [ "$LATEST_VERSION" != "latest" ]; then
            cd /tmp/cutia-source
            git fetch --depth 1 origin "$LATEST_VERSION" || true
            git checkout "$LATEST_VERSION" 2>/dev/null || echo "Using default branch"
          fi

      - name: Build and push image to ghcr.io
        if: steps.check-update.outputs.update_needed == 'true'
        id: build-image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/cutia-source

          UPSTREAM_COMMIT=$(git rev-parse HEAD)
          VERSION_TAG="${UPSTREAM_COMMIT:0:7}"
          cp "${{ github.workspace }}/Dockerfile.template" ./Dockerfile

          GHCR_IMAGE="ghcr.io/${{ github.repository_owner }}/cutia:$VERSION_TAG"
          GHCR_IMAGE=$(echo "$GHCR_IMAGE" | tr '[:upper:]' '[:lower:]')

          docker build -t "$GHCR_IMAGE" .
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          docker push "$GHCR_IMAGE"

          echo "ghcr_image=$GHCR_IMAGE" >> "$GITHUB_OUTPUT"
          echo "build_version=$VERSION_TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.check-update.outputs.update_needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install lzc-cli
        if: steps.check-update.outputs.update_needed == 'true'
        run: npm install -g @lazycatcloud/lzc-cli

      - name: Copy dependency images
        if: steps.check-update.outputs.update_needed == 'true'
        id: deps-images
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
        run: |
          DEFAULT_POSTGRES_URL="registry.lazycat.cloud/library/postgres:16-alpine"
          DEFAULT_REDIS_URL="registry.lazycat.cloud/library/redis:7-alpine"

          POSTGRES_EXISTING=$(lzc-cli appstore my-images 2>&1 | grep "postgres:16-alpine" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+' | head -1 || echo "")
          if [ -n "$POSTGRES_EXISTING" ]; then
            POSTGRES_URL="$POSTGRES_EXISTING"
          else
            COPY_OUTPUT=$(lzc-cli appstore copy-image postgres:16-alpine 2>&1)
            POSTGRES_URL=$(echo "$COPY_OUTPUT" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+' | head -1 || echo "")
          fi

          REDIS_EXISTING=$(lzc-cli appstore my-images 2>&1 | grep "redis:7-alpine" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+' | head -1 || echo "")
          if [ -n "$REDIS_EXISTING" ]; then
            REDIS_URL="$REDIS_EXISTING"
          else
            COPY_OUTPUT=$(lzc-cli appstore copy-image redis:7-alpine 2>&1)
            REDIS_URL=$(echo "$COPY_OUTPUT" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+' | head -1 || echo "")
          fi

          if [ -z "$POSTGRES_URL" ]; then
            echo "Falling back to default postgres image"
            POSTGRES_URL="$DEFAULT_POSTGRES_URL"
          fi

          if [ -z "$REDIS_URL" ]; then
            echo "Falling back to default redis image"
            REDIS_URL="$DEFAULT_REDIS_URL"
          fi

          echo "postgres_url=$POSTGRES_URL" >> "$GITHUB_OUTPUT"
          echo "redis_url=$REDIS_URL" >> "$GITHUB_OUTPUT"

      - name: Copy image to LazyCat registry
        if: steps.check-update.outputs.update_needed == 'true'
        id: copy-image
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GHCR_IMAGE="${{ steps.build-image.outputs.ghcr_image }}"
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          docker pull "$GHCR_IMAGE"

          COPY_OUTPUT=$(lzc-cli appstore copy-image "$GHCR_IMAGE" 2>&1)
          echo "$COPY_OUTPUT"

          ACCELERATED_URL=$(echo "$COPY_OUTPUT" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+' | head -1 || echo "")
          [ -n "$ACCELERATED_URL" ] || { echo "Failed to get accelerated URL"; exit 1; }

          echo "accelerated_url=$ACCELERATED_URL" >> "$GITHUB_OUTPUT"

      - name: Update manifest
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          ACCELERATED_URL="${{ steps.copy-image.outputs.accelerated_url }}"
          BUILD_VERSION="${{ steps.build-image.outputs.build_version }}"
          POSTGRES_URL="${{ steps.deps-images.outputs.postgres_url }}"
          REDIS_URL="${{ steps.deps-images.outputs.redis_url }}"

          sed -i "s|^version:.*|version: $BUILD_VERSION|g" lzc-manifest.yml
          sed -i "0,/image: .*/s|image: .*|image: $ACCELERATED_URL|" lzc-manifest.yml
          sed -i "s|image: registry.lazycat.cloud/library/postgres:16-alpine|image: $POSTGRES_URL|g" lzc-manifest.yml
          sed -i "s|image: registry.lazycat.cloud/library/redis:7-alpine|image: $REDIS_URL|g" lzc-manifest.yml

      - name: Build package
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
        run: |
          lzc-cli project build -o ${{ env.PROJECT_NAME_LOWER }}.lpk

      - name: Upload package artifact
        if: steps.check-update.outputs.update_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME_LOWER }}-lpk
          path: ${{ env.PROJECT_NAME_LOWER }}.lpk
          if-no-files-found: error

      - name: Publish to LazyCat App Store
        if: steps.check-update.outputs.update_needed == 'true' && inputs.publish_to_store == true
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
        run: |
          RELEASE_NOTES=$(cat /tmp/release_notes.txt)
          lzc-cli appstore publish ${{ env.PROJECT_NAME_LOWER }}.lpk --clang en -c "$RELEASE_NOTES"

      - name: Create GitHub release
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_VERSION="${{ steps.build-image.outputs.build_version }}"
          gh release delete "v$BUILD_VERSION" --yes 2>/dev/null || true
          gh release create "v$BUILD_VERSION" \
            --title "v$BUILD_VERSION" \
            --notes-file /tmp/release_notes.txt \
            ${{ env.PROJECT_NAME_LOWER }}.lpk

      - name: Commit and push manifest updates
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lzc-manifest.yml
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi
          git commit -m "Update Cutia to version ${{ steps.build-image.outputs.build_version }}"
          git push
